<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Adversary Engine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="matrix-bg"></div>
    <header>
        <h1 class="glitch">> WORST-CASE LWE ADVERSARY</h1>
        <p>APWPG-WHT MSB Peeling Oracle - Adelic Transition Engine</p>
    </header>

    <div class="dashboard">
        <section class="panel parameters">
            <h2 class="panel-title">[ PARAMETERS ]</h2>
            
            <div class="control-group">
                <label>N - Lattice Dimension: <span id="val-n">128</span></label>
                <input type="range" id="param-n" min="64" max="1024" step="64" value="128">
            </div>

            <div class="control-group">
                <label>Q - LWE Modulus: <span id="val-q">3329</span></label>
                <input type="range" id="param-q" min="1024" max="8192" step="1" value="3329">
            </div>

            <div class="control-group">
                <label>α - Gaussian Noise σ: <span id="val-a">3.2</span></label>
                <input type="range" id="param-a" min="0.1" max="10" step="0.1" value="3.2">
            </div>

            <button id="start-btn">[ START ADVERSARY ENGINE ]</button>
        </section>

        <section class="panel output">
            <div class="log-sub-panel" id="primary-log">
                <h3 class="panel-title">ENGINE OUTPUT - STANDBY</h3>
                <div class="log-content" id="log-main">Awaiting command...</div>
            </div>
            <div class="log-sub-panel" id="secondary-log">
                <h3 class="panel-title">ADELIC STATE ANALYSIS</h3>
                <div class="log-content" id="log-sub">Idle.</div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
